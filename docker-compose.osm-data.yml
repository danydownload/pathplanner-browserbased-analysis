services:
  graphhopper:
    image: eclipse-temurin:17-jre
    restart: unless-stopped
    environment:
      GH_JAVA_HEAP: ${GRAPHHOPPER_JAVA_HEAP:-10g}
      GH_PBF_PATH: ${GRAPHHOPPER_PBF_PATH:-/work/pbf/italy-260626.osm.pbf}
      GH_GRAPH_LOCATION: ${GRAPHHOPPER_GRAPH_LOCATION:-/work/runtime/graphhopper/graphs/italy-gh9}
      GH_JAR_PATH: /work/runtime/graphhopper/lib/graphhopper-web-9.1.jar
      GH_CONFIG_PATH: /work/runtime/graphhopper/config/pathplanner-demo.yml
    ports:
      - "${GRAPHHOPPER_BIND_ADDRESS:-127.0.0.1}:${GRAPHHOPPER_PORT:-8989}:8989"
      - "${GRAPHHOPPER_BIND_ADDRESS:-127.0.0.1}:${GRAPHHOPPER_ADMIN_PORT:-8990}:8990"
    volumes:
      - ./pbf:/work/pbf:ro
      - ./runtime/graphhopper:/work/runtime/graphhopper
    command:
      - sh
      - -c
      - |
        set -eu
        if [ ! -f "$$GH_JAR_PATH" ]; then
          echo "Missing GraphHopper jar: $$GH_JAR_PATH" >&2
          exit 1
        fi
        if [ ! -f "$$GH_PBF_PATH" ]; then
          echo "Missing GraphHopper PBF: $$GH_PBF_PATH" >&2
          exit 1
        fi
        if [ ! -d "$$GH_GRAPH_LOCATION" ] || [ ! -f "$$GH_GRAPH_LOCATION/properties" ]; then
          echo "Graph cache not found, importing $$GH_PBF_PATH into $$GH_GRAPH_LOCATION"
          java -Xmx"$$GH_JAVA_HEAP" \
            -Ddw.graphhopper.datareader.file="$$GH_PBF_PATH" \
            -Ddw.graphhopper.graph.location="$$GH_GRAPH_LOCATION" \
            -jar "$$GH_JAR_PATH" import "$$GH_CONFIG_PATH"
        fi
        exec java -Xmx"$$GH_JAVA_HEAP" \
          -Ddw.graphhopper.datareader.file="$$GH_PBF_PATH" \
          -Ddw.graphhopper.graph.location="$$GH_GRAPH_LOCATION" \
          -jar "$$GH_JAR_PATH" server "$$GH_CONFIG_PATH"

  app:
    depends_on:
      - graphhopper
    environment:
      GRAPHHOPPER_URL: ${GRAPHHOPPER_URL:-http://graphhopper:8989}
      PATHPLANNER_ENSURE_LOCAL_OSM_DB: ${PATHPLANNER_ENSURE_LOCAL_OSM_DB:-false}
      LOCAL_OSM_POI_DB: ${LOCAL_OSM_POI_DB:-/app/runtime/local_osm_pois/italy.sqlite3}
      LOCAL_OSM_PBF_PATH: ${LOCAL_OSM_PBF_PATH:-/app/pbf/italy-260626.osm.pbf}
      LOCAL_OSM_POI_BUILD_MODE: ${LOCAL_OSM_POI_BUILD_MODE:-full}
      LOCAL_OSM_POI_MIN_ROWS: ${LOCAL_OSM_POI_MIN_ROWS:-1}
      LOCAL_OSM_WALKABILITY_MIN_ROWS: ${LOCAL_OSM_WALKABILITY_MIN_ROWS:-1}
    volumes:
      - ./runtime/local_osm_pois:/app/runtime/local_osm_pois
      - ./pbf:/app/pbf:ro
