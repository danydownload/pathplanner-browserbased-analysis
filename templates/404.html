{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page not found</title>
    <link rel="icon" type="image/png" href="{% static 'img/flavicon.png' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link href="{% static 'css/theme.css' %}" rel="stylesheet">
    <link href="{% static 'css/errorPage.css' %}" rel="stylesheet">
</head>
<body class="error-page">
    <main class="error-state">
        <div class="error-mark">404</div>
        <h1>Page not found</h1>
        <p>The page you are looking for does not exist.</p>
        <a id="actionButton" href="{% url 'map' %}" class="btn btn-primary">Back to map</a>
    </main>
</body>
</html>
